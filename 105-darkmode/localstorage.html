<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"

        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"

        crossorigin="anonymous"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"

        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Local Storage</title> 

</head>
<body>
    <section class="container mt-5">
        
        <h1>Local Storage: saving, retrieving, and clearing data</h1>
        <form class="container mt-5">
            <div class="mb-3">
                <label  for="nameInput" class="form-label">Username:</label>
                <input type="text" class="form-control"id="userName" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label for="emailInput" class="form-label">Name:</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label for="ageInput" class="form-label">Age:</label>
                <input type="number" class="form-control" id="userAge" placeholder="Enter your age">
            </div>
            <div class="mb-3">
                <label for="countryInput" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password">

        </form>
          
            <button type="button" class="btn btn-primary" id="saveButton">Save</button>
            <button type="button" class="btn btn-secondary" id="retrieveButton">Retrieve</button>
            <button type="button" class="btn btn-danger" id="clearButton">Clear</button>
        </form>
        <div id="result" class="mt-3">
            <h3>Result:</h3>
            <p id="resultData"></p>
        </div>
    </section>
    
</body>
<script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>  
       
<script src="local-storage.js"></script>
</html>
