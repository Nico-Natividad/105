<html>
    <head>
        <title>Pet Salon Registration</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/dark-mode.css">
    </head>
    <body>
       <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      
      <a class="navbar-brand" href="#">Pet Salon</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="service.html">Services</a>
          <a class="nav-link" href="registration.html">Registration</a>

          <!--for dark/light mode setup-->
       
          
        </div>
      </div>

    </div>
  </nav>
    <div  class="d-flex justify-content-end gap-3" >
          <a id = "lightModeLink">🌞Light Mode</a>
            <button id="changeModeButton">Change Mode</button>
          </div>
        <div id ="form-section">
            <h3> Register a new pet </h3>
            <input type = "text" id ="inputName" placeholder="Pet name">
            <input type = "number" id ="inputAge" placeholder="Age">
            <input type = "text" id ="inputGender" placeholder="Gender">
            <input type = "text" id ="inputServices" placeholder="Required service">
            <input type = "text" id ="inputBreed" placeholder="Breed">
            <button id = "register-btn" onclick="registerPet()"> Register </button>
        </div>

        <section>
            <h2> Registered Pets </h2>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Service</th>
                        <th>Breed</th>
                        <th>delete</th>
                    </tr>
                </thead>
                <tbody id="pet-table-body">
                </tbody>
            </table>
        </section>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>    
<script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>  
        <script src="dark-mode.js"></script>
<script src="registration.js"></script>
        
    </body>
</html>
